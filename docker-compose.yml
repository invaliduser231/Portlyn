services:
  postgres:
    image: postgres:17.9-alpine
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-portlyn}"
      POSTGRES_USER: "${POSTGRES_USER:-portlyn}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}"
    volumes:
      - portlyn_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portlyn} -d ${POSTGRES_DB:-portlyn}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  portlyn:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "${PORTLYN_API_BIND_ADDR:-127.0.0.1}:${PORTLYN_API_PORT:-8080}:8080"
      - "${PORTLYN_HTTP_PORT:-80}:80"
      - "${PORTLYN_HTTPS_PORT:-443}:443"
      - "${PORTLYN_TUNNEL_PORT:-51820}:51820/udp"
    environment:
      HTTP_ADDR: ":8080"
      PROXY_HTTP_ADDR: ":80"
      PROXY_HTTPS_ADDR: ":443"
      DATABASE_DRIVER: "${DATABASE_DRIVER:-postgres}"
      DATABASE_URL: "${DATABASE_URL:-postgres://${POSTGRES_USER:-portlyn}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}@postgres:5432/${POSTGRES_DB:-portlyn}?sslmode=prefer}"
      DATABASE_PATH: "/data/portlyn.db"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env.docker}"
      JWT_SIGNING_SECRET: "${JWT_SIGNING_SECRET:?set JWT_SIGNING_SECRET in .env.docker}"
      SESSION_BRIDGE_SECRET: "${SESSION_BRIDGE_SECRET:?set SESSION_BRIDGE_SECRET in .env.docker}"
      OIDC_STATE_SECRET: "${OIDC_STATE_SECRET:?set OIDC_STATE_SECRET in .env.docker}"
      MFA_ENCRYPTION_SECRET: "${MFA_ENCRYPTION_SECRET:?set MFA_ENCRYPTION_SECRET in .env.docker}"
      CSRF_SECRET: "${CSRF_SECRET:?set CSRF_SECRET in .env.docker}"
      DATA_ENCRYPTION_SECRET: "${DATA_ENCRYPTION_SECRET:?set DATA_ENCRYPTION_SECRET in .env.docker}"
      DATA_ENCRYPTION_LEGACY_SECRETS: "${DATA_ENCRYPTION_LEGACY_SECRETS:-}"
      JWT_ISSUER: "${JWT_ISSUER:-portlyn}"
      TOKEN_TTL: "${TOKEN_TTL:-30m}"
      REFRESH_TOKEN_TTL: "${REFRESH_TOKEN_TTL:-720h}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}"
      FRONTEND_BASE_URL: "${FRONTEND_BASE_URL:-http://localhost}"
      BOOTSTRAP_ADMIN_ENABLED: "${BOOTSTRAP_ADMIN_ENABLED:-false}"
      REQUIRE_MFA_FOR_ADMINS: "${REQUIRE_MFA_FOR_ADMINS:-true}"
      METRICS_PUBLIC: "${METRICS_PUBLIC:-false}"
      TRUSTED_PROXY_CIDRS: "${TRUSTED_PROXY_CIDRS:-}"
      EXPOSE_AUTH_TOKENS: "${EXPOSE_AUTH_TOKENS:-false}"
      APP_VERSION: "${APP_VERSION:-docker}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:?set ADMIN_EMAIL in .env.docker}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env.docker}"
      VIEWER_EMAIL: "${VIEWER_EMAIL:-viewer@example.com}"
      VIEWER_PASSWORD: "${VIEWER_PASSWORD:-}"
      CERTIFICATE_STORAGE_DIR: "/data/certificates"
      REDIRECT_HTTP_TO_HTTPS: "${REDIRECT_HTTP_TO_HTTPS:-false}"
      ACME_ENABLED: "${ACME_ENABLED:-false}"
      ACME_EMAIL: "${ACME_EMAIL:-}"
      ACME_CA_URL: "${ACME_CA_URL:-}"
      ACME_POLL_INTERVAL: "${ACME_POLL_INTERVAL:-1m}"
      AUTH_RATE_LIMIT_ATTEMPTS: "${AUTH_RATE_LIMIT_ATTEMPTS:-10}"
      AUTH_RATE_LIMIT_WINDOW: "${AUTH_RATE_LIMIT_WINDOW:-10m}"
      AUTH_CACHE_TTL: "${AUTH_CACHE_TTL:-1m}"
      AUDIT_BUFFER_SIZE: "${AUDIT_BUFFER_SIZE:-4096}"
      NODE_OFFLINE_AFTER: "${NODE_OFFLINE_AFTER:-2m}"
      NODE_REQUIRE_HTTPS: "${NODE_REQUIRE_HTTPS:-true}"
      NODE_TRUST_FORWARDED_PROTO: "${NODE_TRUST_FORWARDED_PROTO:-false}"
      NODE_ALLOW_MTLS_HEADER_FALLBACK: "${NODE_ALLOW_MTLS_HEADER_FALLBACK:-false}"
      NODE_ENROLL_RATE_LIMIT: "${NODE_ENROLL_RATE_LIMIT:-20}"
      NODE_ENROLL_RATE_WINDOW: "${NODE_ENROLL_RATE_WINDOW:-10m}"
      NODE_HEARTBEAT_AUTH_FAIL_RATE_LIMIT: "${NODE_HEARTBEAT_AUTH_FAIL_RATE_LIMIT:-20}"
      NODE_HEARTBEAT_AUTH_FAIL_RATE_WINDOW: "${NODE_HEARTBEAT_AUTH_FAIL_RATE_WINDOW:-1m}"
      BREAK_GLASS_ENABLED: "${BREAK_GLASS_ENABLED:-false}"
      BREAK_GLASS_TOKEN: "${BREAK_GLASS_TOKEN:-}"
      BREAK_GLASS_TTL: "${BREAK_GLASS_TTL:-15m}"
      BREAK_GLASS_ALLOW_CIDRS: "${BREAK_GLASS_ALLOW_CIDRS:-127.0.0.1/32,::1/128}"
      ALERT_LOGIN_FAIL_SPIKE_THRESHOLD: "${ALERT_LOGIN_FAIL_SPIKE_THRESHOLD:-20}"
      ALERT_NODE_HEARTBEAT_FAIL_THRESHOLD: "${ALERT_NODE_HEARTBEAT_FAIL_THRESHOLD:-20}"
      ALERT_AUDIT_ANOMALY_THRESHOLD: "${ALERT_AUDIT_ANOMALY_THRESHOLD:-10}"
      ALERT_WINDOW: "${ALERT_WINDOW:-15m}"
      ALLOW_INSECURE_DEV_MODE: "${ALLOW_INSECURE_DEV_MODE:-false}"
      OIDC_ENABLED: "${OIDC_ENABLED:-false}"
      OIDC_ISSUER_URL: "${OIDC_ISSUER_URL:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_REDIRECT_URL: "${OIDC_REDIRECT_URL:-}"
      OIDC_ALLOWED_EMAIL_DOMAINS: "${OIDC_ALLOWED_EMAIL_DOMAINS:-}"
      OIDC_ADMIN_ROLE_CLAIM_PATH: "${OIDC_ADMIN_ROLE_CLAIM_PATH:-realm_access.roles}"
      OIDC_ADMIN_ROLE_VALUE: "${OIDC_ADMIN_ROLE_VALUE:-}"
      OIDC_PROVIDER_LABEL: "${OIDC_PROVIDER_LABEL:-SSO}"
      OIDC_ALLOW_EMAIL_LINKING: "${OIDC_ALLOW_EMAIL_LINKING:-false}"
      OIDC_REQUIRE_VERIFIED_EMAIL: "${OIDC_REQUIRE_VERIFIED_EMAIL:-true}"
      OTP_ENABLED: "${OTP_ENABLED:-true}"
      OTP_TOKEN_TTL: "${OTP_TOKEN_TTL:-10m}"
      OTP_REQUEST_LIMIT: "${OTP_REQUEST_LIMIT:-5}"
      OTP_REQUEST_WINDOW: "${OTP_REQUEST_WINDOW:-15m}"
      OTP_RESPONSE_INCLUDES_CODE: "${OTP_RESPONSE_INCLUDES_CODE:-false}"
    volumes:
      - portlyn_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/livez"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      logging: "alloy"
      service: "portlyn"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-}"
        INTERNAL_API_BASE_URL: "http://portlyn:8080"
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-}"
      INTERNAL_API_BASE_URL: "http://portlyn:8080"
    depends_on:
      portlyn:
        condition: service_healthy
    labels:
      logging: "alloy"
      service: "frontend"
    expose:
      - "3000"

  loki:
    image: grafana/loki:3.6.3
    restart: unless-stopped
    init: true
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "${LOKI_BIND_ADDR:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    volumes:
      - ./deploy/loki/config.yml:/etc/loki/config.yml:ro
      - portlyn_loki_data:/loki

  alloy:
    image: grafana/alloy:v1.12.1
    restart: unless-stopped
    init: true
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "--storage.path=/var/lib/alloy/data", "/etc/alloy/config.alloy"]
    depends_on:
      - loki
    volumes:
      - ./deploy/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portlyn_alloy_data:/var/lib/alloy/data

  grafana:
    image: grafana/grafana:12.3.1
    restart: unless-stopped
    init: true
    ports:
      - "${GRAFANA_BIND_ADDR:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env.docker}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - loki
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - portlyn_grafana_data:/var/lib/grafana

volumes:
  portlyn_data:
  portlyn_postgres_data:
  portlyn_loki_data:
  portlyn_alloy_data:
  portlyn_grafana_data:
