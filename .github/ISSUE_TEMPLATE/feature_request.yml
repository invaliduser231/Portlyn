name: Feature request
description: Suggest an improvement for Portlyn
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you tried or evaluated already?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, examples, or related tools if helpful.

