name: Bug report
description: Report a reproducible bug in Portlyn
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Briefly describe the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction.
      placeholder: |
        1. Start the stack with ...
        2. Open ...
        3. Trigger ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: e.g. main, tag, commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Docker version, browser, database mode, reverse proxy setup

