name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          out=$(gofmt -l $(find . -type f -name '*.go' -not -path './.gomodcache/*' -not -path './cmd/server/frontend_dist/*'))
          if [ -n "$out" ]; then
            echo "::error::Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: Vet backend
        run: go vet ./...

      - name: Test backend (race)
        run: go test -race -timeout 5m ./...

      - name: Build backend
        run: go build ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npx tsc --noEmit

      - name: Run frontend tests
        run: npm test

      - name: Build frontend (dev)
        run: npm run build

      - name: Build frontend (static export)
        run: PORTLYN_STATIC_EXPORT=1 npm run build

  container-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate Docker Compose wiring
        run: docker compose --env-file .env.docker.example config

      - name: Build backend image
        run: docker build -t portlyn-backend:test .

      - name: Build frontend image
        run: docker build -t portlyn-frontend:test ./frontend

      - name: Build single-binary image
        run: docker build -t portlyn-single:test -f Dockerfile.single .

  single-binary:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build static frontend
        run: |
          cd frontend
          npm ci
          PORTLYN_STATIC_EXPORT=1 npm run build
          rm -rf ../cmd/server/frontend_dist
          mv out ../cmd/server/frontend_dist
      - name: Build portlyn binary
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o portlyn ./cmd/server
      - uses: actions/upload-artifact@v4
        with:
          name: portlyn-linux-amd64
          path: portlyn
          retention-days: 7
