name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build server binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/portlyn-server-linux-amd64 ./cmd/server
          GOOS=linux GOARCH=amd64 go build -o dist/portlyn-nodeagent-linux-amd64 ./cmd/nodeagent

      - name: Create checksums
        run: |
          cd dist
          sha256sum -- * > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Sign checksums (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign-blob --yes dist/checksums.txt --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/portlyn-server-linux-amd64
            dist/portlyn-nodeagent-linux-amd64
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem

  publish-containers:
    name: Publish Container Images
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend image metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/invaliduser231/portlyn
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          flavor: |
            latest=true

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          provenance: false

      - name: Extract frontend image metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/invaliduser231/portlyn-frontend
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          flavor: |
            latest=true

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          provenance: false
