name: Container Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 5 * * 3"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build server and nodeagent binaries for image
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/portlyn-linux-amd64 ./cmd/server
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/portlyn-nodeagent-linux-amd64 ./cmd/nodeagent

      - name: Build backend image
        run: docker build --build-arg TARGETARCH=amd64 -t portlyn-backend:scan .

      - name: Build frontend image
        run: docker build -t portlyn-frontend:scan ./frontend

      - name: Generate backend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: portlyn-backend:scan
          artifact-name: sbom-backend.spdx.json
          format: spdx-json

      - name: Generate frontend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: portlyn-frontend:scan
          artifact-name: sbom-frontend.spdx.json
          format: spdx-json

      - name: Run Trivy for backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: portlyn-backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Run Trivy for frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: portlyn-frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload backend Trivy results
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload frontend Trivy results
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
